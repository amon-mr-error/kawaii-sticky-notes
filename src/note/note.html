<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sticky Note</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="note.css" />
</head>
<body>
  <div class="note" id="note-root" data-color="pink">
    <header class="note-bar" id="note-bar">
      <button class="dot-btn no-drag" id="color-btn" title="Note color" aria-label="Change note color">
        <span class="dot"></span>
      </button>
      <button class="icon-btn no-drag" id="new-btn" title="New note (Ctrl+Alt+N)" aria-label="New note">
        <svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none"/></svg>
      </button>
      <button class="icon-btn no-drag" id="overview-btn" title="Notes list" aria-label="Open notes list">
        <svg viewBox="0 0 24 24" width="15" height="15"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor"/></svg>
      </button>

      <div class="bar-spacer"></div>

      <button class="icon-btn no-drag" id="fav-btn" title="Add to favorites" aria-label="Favorite">
        <svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 2.6l2.74 6.24 6.78.62-5.13 4.55 1.55 6.66L12 17.06l-5.94 3.61 1.55-6.66L2.48 9.46l6.78-.62L12 2.6z" /></svg>
      </button>
      <button class="icon-btn no-drag" id="menu-btn" title="More options" aria-label="More options">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="5" cy="12" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="19" cy="12" r="1.9"/></svg>
      </button>
      <button class="icon-btn close-btn no-drag" id="close-btn" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </header>

    <div class="popover color-popover no-drag" id="color-popover" hidden>
      <button class="swatch" data-color="pink" title="Pink"></button>
      <button class="swatch" data-color="lavender" title="Lavender"></button>
      <button class="swatch" data-color="mint" title="Mint"></button>
      <button class="swatch" data-color="peach" title="Peach"></button>
      <button class="swatch" data-color="sky" title="Sky"></button>
      <button class="swatch" data-color="lemon" title="Lemon"></button>
    </div>

    <div class="popover menu-popover no-drag" id="menu-popover" hidden>
      <button id="pin-action">
        <span class="mi">📌</span> <span class="pin-label">Keep on top</span>
      </button>
      <button id="archive-action"><span class="mi">🗃️</span> Archive note</button>
      <button id="hide-action"><span class="mi">🙈</span> Hide note</button>
      <div class="menu-sep"></div>
      <button id="trash-action" class="danger"><span class="mi">🗑️</span> Delete note</button>
    </div>

    <div class="note-body" id="note-body" contenteditable="true" spellcheck="false"
         data-placeholder="Write something sweet…"></div>

    <footer class="note-toolbar no-drag" id="note-toolbar">
      <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
      <span class="tb-divider"></span>
      <button data-cmd="insertUnorderedList" title="Bulleted list">
        <svg viewBox="0 0 24 24" width="15" height="15"><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/><path d="M9 6h11M9 12h11M9 18h11" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      </button>
      <button id="checklist-btn" title="Checklist">
        <svg viewBox="0 0 24 24" width="15" height="15"><rect x="3" y="4" width="6" height="6" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4.3 7l1 1 1.8-2" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="14" width="6" height="6" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 7h9M12 17h9" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <span class="tb-divider"></span>
      <button id="image-btn" title="Insert picture">
        <svg viewBox="0 0 24 24" width="15" height="15"><rect x="3" y="4" width="18" height="16" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="8.3" cy="9.3" r="1.6"/><path d="M4 17l5-5 3.5 3.5L17 10l3.4 3.4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="undo-btn" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" width="15" height="15"><path d="M7 7H4v6M4 10c2-3.5 5.8-5.4 9.2-4.6 3.6.9 6 4.3 5.6 8-.4 3.4-3.4 6-6.8 6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </footer>
  </div>

  <script src="note.js"></script>
</body>
</html>
